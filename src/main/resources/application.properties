spring.application.name=school

# MongoDB Atlas
spring.data.mongodb.uri=${MONGO_URI}

# JWT Configuration
jwt.secret=${JWT_SECRET:schoolSystemSecretKey2024VeryLongSecretKeyForJWTSigning!}
jwt.expiration=120000

# Server port
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:3000

# Logging to file
logging.file.name=logs/spring.log
logging.level.org.mongodb=DEBUG
logging.level.com.pinecone=DEBUG
